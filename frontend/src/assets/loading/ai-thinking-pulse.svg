<svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
  <style>
    .pf-pulse { animation: pf-pulse 1.6s ease-out infinite; transform-origin: 30px 30px; }
    @keyframes pf-pulse { 0% { transform: scale(0.4); opacity: 0.7; } 100% { transform: scale(1.4); opacity: 0; } }
  </style>
  <circle class="pf-pulse" cx="30" cy="30" r="16" fill="none" stroke="#FF6B57" stroke-width="2"/>
  <circle cx="30" cy="30" r="8" fill="#FF6B57"/>
</svg>
