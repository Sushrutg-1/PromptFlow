<svg width="60" height="24" viewBox="0 0 60 24" xmlns="http://www.w3.org/2000/svg">
  <style>
    .pf-dot { animation: pf-bounce 1.1s ease-in-out infinite; }
    .pf-dot:nth-child(2) { animation-delay: 0.15s; }
    .pf-dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes pf-bounce { 0%,60%,100% { transform: translateY(0); opacity: 0.5; } 30% { transform: translateY(-6px); opacity: 1; } }
  </style>
  <circle class="pf-dot" cx="12" cy="12" r="5" fill="#5B4FF0"/>
  <circle class="pf-dot" cx="30" cy="12" r="5" fill="#5B4FF0"/>
  <circle class="pf-dot" cx="48" cy="12" r="5" fill="#FF6B57"/>
</svg>
